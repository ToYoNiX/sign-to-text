name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - model.onnx
      - label_map.json
      - templates/site.html
      - build.py

# Required for the deploy-pages action to push the site
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-progress deploy if a new push comes in
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
