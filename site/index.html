<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARSL Live Recognition</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f172a;
  --surface: #1e293b;
  --border:  #334155;
  --muted:   #64748b;
  --text:    #e2e8f0;
  --indigo:  #6366f1;
  --green:   #22c55e;
  --amber:   #f59e0b;
  --red:     #ef4444;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
  gap: 14px;
}

/* ── header ── */
.top-bar {
  width: 100%; max-width: 860px;
  display: flex; align-items: center; justify-content: space-between;
}
h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.badge {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 9999px; padding: 4px 14px;
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.3px;
}

/* ── status pill ── */
.pill {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 16px; border-radius: 9999px;
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; transition: background 0.3s;
}
.pill .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.65); }

/* ── loading overlay ── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--indigo);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; font-weight: 600; color: var(--muted); }
.loading-sub  { font-size: 12px; color: #475569; }

/* ── camera ── */
.video-wrap {
  position: relative;
  width: 100%; max-width: 860px;
  aspect-ratio: 16/9;
  background: var(--surface);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 4px 40px rgba(0,0,0,0.55);
}
#video {
  width: 100%; height: 100%; object-fit: cover;
  display: block; transform: scaleX(-1);
}
#canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
}
.fps-badge {
  position: absolute; bottom: 10px; right: 12px;
  background: rgba(15,23,42,0.75); backdrop-filter: blur(4px);
  border: 1px solid var(--border); border-radius: 9999px;
  padding: 3px 10px; font-size: 11px; font-weight: 700; color: var(--muted);
  pointer-events: none;
}

/* ── result card ── */
.result-card {
  width: 100%; max-width: 860px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: border-color 0.3s;
}
.result-card.high   { border-color: var(--green); }
.result-card.medium { border-color: var(--amber); }
.result-card.low    { border-color: var(--red);   }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 700; letter-spacing: 0.4px;
}
.conf-pill {
  padding: 2px 10px; border-radius: 9999px;
  font-size: 11px; font-weight: 800; transition: all 0.2s;
}

.card-body { padding: 0 20px 20px; }

/* big sign + confidence row */
.hero-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; padding: 16px 0 12px;
}
.hero-sign {
  font-size: 88px; font-weight: 800; line-height: 1;
  direction: rtl; transition: color 0.2s, opacity 0.15s;
  min-width: 100px; text-align: center;
}
.hero-sign.idle { color: #334155; }

.hero-right { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.hero-conf-label { font-size: 12px; color: var(--muted); font-weight: 600; }
.hero-conf-track {
  height: 8px; background: var(--bg); border-radius: 9999px; overflow: hidden;
}
.hero-conf-fill {
  height: 100%; border-radius: 9999px;
  transition: width 0.25s ease, background 0.3s;
}

/* top-3 list */
.top3 { display: flex; flex-direction: column; gap: 9px; border-top: 1px solid var(--border); padding-top: 14px; }
.top3-row { display: flex; align-items: center; gap: 10px; }
.top3-rank { font-size: 10px; font-weight: 700; color: var(--muted); min-width: 14px; }
.top3-sign {
  font-size: 20px; font-weight: 700; direction: rtl;
  min-width: 30px; text-align: center; color: var(--text);
}
.top3-track {
  flex: 1; height: 5px; background: var(--bg); border-radius: 9999px; overflow: hidden;
}
.top3-fill { height: 100%; border-radius: 9999px; background: var(--indigo); transition: width 0.2s ease; }
.top3-pct { font-size: 12px; font-weight: 600; color: var(--muted); min-width: 46px; text-align: right; }

/* ── error ── */
.error-box {
  width: 100%; max-width: 860px;
  background: #7f1d1d; color: #fca5a5;
  border-radius: 10px; padding: 12px 20px;
  font-size: 14px; text-align: center; display: none;
}

@media (max-width: 560px) {
  .hero-sign { font-size: 60px; }
}
</style>
</head>
<body>

<!-- loading overlay (hidden once ready) -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading model…</div>
  <div class="loading-sub">MediaPipe + ONNX runtime initialising</div>
</div>

<div class="top-bar">
  <h1>ARSL Live Recognition</h1>
  <div class="badge">SVM · 38 signs · fully offline</div>
</div>

<div class="pill" id="status-pill" style="background:var(--amber)">
  <span class="dot"></span>
  <span id="status-text">Loading…</span>
</div>

<div class="error-box" id="error-box"></div>

<div class="video-wrap">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="fps-badge" id="fps-badge">— fps</div>
</div>

<div class="result-card" id="result-card">
  <div class="card-header">
    <span style="color:var(--indigo)">SVM Prediction</span>
    <span class="conf-pill" id="conf-pill" style="background:var(--border);color:var(--muted)">—</span>
  </div>
  <div class="card-body">
    <div class="hero-row">
      <div class="hero-sign idle" id="hero-sign">—</div>
      <div class="hero-right">
        <div class="hero-conf-label">Confidence</div>
        <div class="hero-conf-track">
          <div class="hero-conf-fill" id="hero-conf-fill" style="width:0%;background:var(--indigo)"></div>
        </div>
        <div class="hero-conf-label" id="conf-pct-label" style="color:var(--muted)">—</div>
      </div>
    </div>
    <div class="top3" id="top3-list"></div>
  </div>
</div>

<!-- onnxruntime-web global (must load before the module script) -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/+esm";

// ── MediaPipe hand skeleton ────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

// ── DOM refs ───────────────────────────────────────────────────────────────────
const overlay   = document.getElementById("loading-overlay");
const loadText  = document.getElementById("loading-text");
const errorBox  = document.getElementById("error-box");
const video     = document.getElementById("video");
const canvas    = document.getElementById("canvas");
const ctx       = canvas.getContext("2d");
const statusPill = document.getElementById("status-pill");
const statusText = document.getElementById("status-text");
const fpsBadge  = document.getElementById("fps-badge");
const card      = document.getElementById("result-card");
const heroSign  = document.getElementById("hero-sign");
const heroFill  = document.getElementById("hero-conf-fill");
const confPill  = document.getElementById("conf-pill");
const confPct   = document.getElementById("conf-pct-label");
const top3El    = document.getElementById("top3-list");

// ── State ──────────────────────────────────────────────────────────────────────
let landmarker   = null;
let onnxSession  = null;
let labelMap     = {};
let lastVideoTime = -1;
let lastPredictTs = 0;
let predictInFlight = false;
let fpsFrames = 0, fpsLastTs = performance.now();
const PREDICT_INTERVAL = 80; // ms (~12 preds/sec)

// ── Normalise landmarks (same function as the capture system) ─────────────────
function normalizeHand(lm) {
  const { x: wx, y: wy, z: wz } = lm[0];
  const dx = lm[9].x - wx, dy = lm[9].y - wy, dz = lm[9].z - wz;
  const scale = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
  return lm.map(({ x, y, z }) => ({
    x: +((x - wx) / scale).toFixed(4),
    y: +((y - wy) / scale).toFixed(4),
    z: +((z - wz) / scale).toFixed(4),
  }));
}

// ── Draw hand skeleton ────────────────────────────────────────────────────────
function drawHand(results) {
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!results.landmarks?.length) return;
  for (const lm of results.landmarks) {
    ctx.strokeStyle = "rgba(99,102,241,0.85)";
    ctx.lineWidth = 2.5;
    for (const [a, b] of CONNECTIONS) {
      ctx.beginPath();
      ctx.moveTo(lm[a].x * canvas.width, lm[a].y * canvas.height);
      ctx.lineTo(lm[b].x * canvas.width, lm[b].y * canvas.height);
      ctx.stroke();
    }
    for (let i = 0; i < lm.length; i++) {
      ctx.beginPath();
      ctx.arc(lm[i].x * canvas.width, lm[i].y * canvas.height, i === 0 ? 7 : 4.5, 0, Math.PI*2);
      ctx.fillStyle = i === 0 ? "#f59e0b" : "#22c55e";
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}

// ── Confidence → colour ───────────────────────────────────────────────────────
function confColor(c) {
  if (c >= 0.80) return "#22c55e";
  if (c >= 0.50) return "#f59e0b";
  return "#ef4444";
}
function confCardClass(c) {
  if (c >= 0.80) return "high";
  if (c >= 0.50) return "medium";
  return "low";
}

// ── Status pill ───────────────────────────────────────────────────────────────
function setStatus(state) {
  const colors = { loading: "#f59e0b", detecting: "#22c55e", no_hand: "#ef4444" };
  const labels = { loading: "Loading…", detecting: "Detecting", no_hand: "No hand detected" };
  statusPill.style.background = colors[state];
  statusText.textContent = labels[state];
}

// ── Reset card to idle ────────────────────────────────────────────────────────
function resetCard() {
  card.className = "result-card";
  heroSign.textContent = "—";
  heroSign.className = "hero-sign idle";
  heroSign.style.color = "";
  heroFill.style.width = "0%";
  confPill.textContent = "—";
  confPill.style.background = "var(--border)";
  confPill.style.color = "var(--muted)";
  confPct.textContent = "—";
  confPct.style.color = "var(--muted)";
  top3El.innerHTML = "";
}

// ── Update UI from ONNX output ────────────────────────────────────────────────
function updateUI(labelIdx, proba) {
  const label = labelMap[labelIdx] ?? "?";
  const conf  = proba[labelIdx];
  const color = confColor(conf);
  const pct   = (conf * 100).toFixed(1) + "%";

  card.className = "result-card " + confCardClass(conf);

  heroSign.textContent = label;
  heroSign.className = "hero-sign";
  heroSign.style.color = color;

  heroFill.style.width = (conf * 100) + "%";
  heroFill.style.background = color;

  confPill.textContent = pct;
  confPill.style.background = color + "22";
  confPill.style.color = color;

  confPct.textContent = pct;
  confPct.style.color = color;

  // top-3
  const sorted = Array.from(proba)
    .map((p, i) => [i, p])
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3);

  top3El.innerHTML = "";
  const maxP = sorted[0][1];
  sorted.forEach(([idx, p], rank) => {
    const pctBar = maxP > 0 ? (p / maxP) * 100 : 0;
    const row = document.createElement("div");
    row.className = "top3-row";
    row.innerHTML = `
      <span class="top3-rank">#${rank + 1}</span>
      <span class="top3-sign">${labelMap[idx] ?? "?"}</span>
      <div class="top3-track">
        <div class="top3-fill" style="width:${pctBar}%;background:${rank === 0 ? color : 'var(--indigo)'}88"></div>
      </div>
      <span class="top3-pct">${(p * 100).toFixed(1)}%</span>`;
    top3El.appendChild(row);
  });
}

// ── ONNX inference ────────────────────────────────────────────────────────────
async function runOnnx(normalized) {
  if (predictInFlight) return;
  predictInFlight = true;
  try {
    const flat = new Float32Array(63);
    normalized.forEach(({ x, y, z }, i) => {
      flat[i*3] = x; flat[i*3+1] = y; flat[i*3+2] = z;
    });
    const tensor = new ort.Tensor("float32", flat, [1, 63]);
    const out = await onnxSession.run({ float_input: tensor });
    const labelIdx = Number(out["label"].data[0]);
    const proba    = out["probabilities"].data;     // Float32Array length 38
    updateUI(labelIdx, proba);
  } catch (e) {
    console.warn("ONNX inference error:", e);
  } finally {
    predictInFlight = false;
  }
}

// ── Detection loop ────────────────────────────────────────────────────────────
function detectFrame() {
  if (!landmarker || video.readyState < 2) {
    requestAnimationFrame(detectFrame);
    return;
  }

  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const results = landmarker.detectForVideo(video, video.currentTime * 1000);
    const hasHand = !!results.landmarks?.length;

    drawHand(results);
    setStatus(hasHand ? "detecting" : "no_hand");

    if (hasHand) {
      const now = performance.now();
      if (now - lastPredictTs > PREDICT_INTERVAL) {
        lastPredictTs = now;
        runOnnx(normalizeHand(results.landmarks[0]));
      }
    } else {
      resetCard();
    }

    // FPS
    fpsFrames++;
    const elapsed = performance.now() - fpsLastTs;
    if (elapsed >= 1000) {
      fpsBadge.textContent = `${Math.round(fpsFrames * 1000 / elapsed)} fps`;
      fpsFrames = 0;
      fpsLastTs = performance.now();
    }
  }

  requestAnimationFrame(detectFrame);
}

// ── Init ───────────────────────────────────────────────────────────────────────
async function init() {
  try {
    // 1. Load label map
    loadText.textContent = "Loading label map…";
    const lmRes = await fetch("./label_map.json");
    const raw   = await lmRes.json();
    labelMap = Object.fromEntries(Object.entries(raw).map(([k, v]) => [Number(k), v]));

    // 2. Load ONNX model
    loadText.textContent = "Loading ONNX model…";
    ort.env.wasm.wasmPaths =
      "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/";
    onnxSession = await ort.InferenceSession.create("./model.onnx", {
      executionProviders: ["wasm"],
    });

    // 3. Load MediaPipe
    loadText.textContent = "Loading MediaPipe…";
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
    );
    landmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO",
      numHands: 1,
    });

    // 4. Camera
    loadText.textContent = "Starting camera…";
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: 1280, height: 720 },
    });
    video.srcObject = stream;
    await video.play();

    // Done
    overlay.style.display = "none";
    setStatus("no_hand");
    requestAnimationFrame(detectFrame);
  } catch (err) {
    overlay.style.display = "none";
    errorBox.style.display = "";
    errorBox.textContent = "Error: " + err.message;
    setStatus("loading");
  }
}

init();
</script>
</body>
</html>
